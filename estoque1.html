<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="favicon.ico">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Estoque - Sistema de Pedidos</title>
<style>
 /* ====== LOGO ====== */
  .logo-container img {
  transition: transform .2s ease, box-shadow .2s ease;
}

.logo-container img:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

  .logo-container {
  width: 100%
  justify-content: flex-start;/* ou center se quiser centralizar tudo*/
  display: flex;
  align-items: center;
  gap: 35px; /* espaço entre as imagens */
  margin: 10px 15px;
  background-color: #ffffff /*fundo branco puro*/
  margin: 10px;
}

.logo-container img {
  height: 110px; /* ajusta o tamanho igual pra todas */
  width: auto;
  border-radius: 8px; /* opcional: cantos levemente arredondados */
}
:root {
  --bg: #f3f6fa;
  --card: #fff;
  --accent: #0b63d6;
  --muted: #556;
}

body {
  font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
  background: ffffff;
  margin: 0;
  padding: 18px;
  color: #062436;
}

.container {
  max-width: 950px;
  margin: 0 auto;
}

h1 {
  font-size: 22px;
  margin-bottom: 14px;
  text-align: center;
  color: var(--accent);
}

h2 {
  margin-top: 20px;
  color: var(--accent);
}

.list {
  margin-top: 12px;
}

.item {
  border: 1px solid #eef4fb;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 10px;
  background: var(--card);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  font-size: 1.1em;
  font-weight: bold; /* NOVO: Deixa o texto do item em negrito */
}

.meta {
  font-size: 16px;
  color: var(--muted);
 
}

.enviado {
  color: green;
  font-weight: bold;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  margin-left: 4px;
}

.btn-enviar {
  background: var(--accent);
  color: #fff;
}

.btn-secondary {
  background: #e6ebf0;
  color: #062436;
}

button:hover { opacity: 0.9; }

#contadorPedidos {
  position: relative;
  top: 10px;
  right: 0px;
  background-color: #0b63d6;
  color: #fff;
  padding: 10px 20px;
  border-radius: 100px;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 1000;
  font-family: Arial, sans-serif;
}

footer {
  margin-top: 16px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

/* Estilo base das abas */
.tab-btn { 
  padding: 10px 15px; 
  border: none; 
  cursor: pointer; 
  font-weight: bold; 
  color: #555; 
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: 0.3s;
}

.tab-btn { padding: 10px 15px; border: none; cursor: pointer; background: none; font-weight: bold; color: #555; white-space: nowrap; }
  .msg-estoque { background: #d1e7dd; padding: 5px 10px; border-radius: 8px; margin-bottom: 5px; text-align: right; margin-left: 20%; border: 1px solid #bcd0c7; }
  .msg-producao { background: #e2e3e5; padding: 5px 10px; border-radius: 8px; margin-bottom: 5px; text-align: left; margin-right: 20%; border: 1px solid #d6d8db; }

/* Cores específicas quando a aba está ativa - O !important garante que a cor mude */
.tab-sonia.active { color: #ff69b4 !important; border-bottom: 3px solid #ff69b4 !important; background: #fff0f5 !important; } 
.tab-dalva.active { color: #e74c3c !important; border-bottom: 3px solid #e74c3c !important; background: #fdf2f2 !important; } 
.tab-josileide.active { color: #2ecc71 !important; border-bottom: 3px solid #2ecc71 !important; background: #f2fdf6 !important; } 
.tab-creuza.active { color: #9b59b6 !important; border-bottom: 3px solid #9b59b6 !important; background: #f9f2fd !important; } 
.tab-elane.active { color: #e67e22 !important; border-bottom: 3px solid #e67e22 !important; background: #fdf7f2 !important; }

/* Cores das bordas do container de chat */
.border-sonia { border: 3px solid #ff69b4 !important; }
.border-dalva { border: 3px solid #e74c3c !important; }
.border-josileide { border: 3px solid #2ecc71 !important; }
.border-creuza { border: 3px solid #9b59b6 !important; }
.border-elane { border: 3px solid #e67e22 !important; }

/* Cores para os balões de mensagem enviados pelo Estoque */
.cor-balao-sonia { background-color: #fff0f5 !important; border: 2px solid #ff69b4 !important; } /* Rosa */
.cor-balao-dalva { background-color: #fdf2f2 !important; border: 2px solid #e74c3c !important; } /* Vermelho */
.cor-balao-josileide { background-color: #f2fdf6 !important; border: 2px solid #2ecc71 !important; } /* Verde */
.cor-balao-creuza { background-color: #f9f2fd !important; border: 2px solid #9b59b6 !important; } /* Roxo */
.cor-balao-elane { background-color: #fdf7f2 !important; border: 2px solid #e67e22 !important; } /* Laranja */

/* Ajuste suave no fundo da caixa de mensagens para combinar */
.bg-sonia { background-color: #fff0f5 !important; }
.bg-dalva { background-color: #fdf2f2 !important; }
.bg-josileide { background-color: #f2fdf6 !important; }
.bg-creuza { background-color: #f9f2fd !important; }
.bg-elane { background-color: #fdf7f2 !important; }

</style>
</head>
<body>
 <!-- Logo Elka -->
 <div class="logo-container">
  <img src="logo-elka.png" alt="Logo Elka" class="logo-elka">
  <img src="caca.png" alt="Brinquedo Cacá" class="logo-extra">
  <img src="dino.png" alt="Brinquedo Dino" class="logo-extra">
  <img src="bibi.png" alt="brinquedo bibi" class="logo-extra">
  <img src="pinos.png" alt="brinquedo pinos" class="logo-extra">
  <img src="stitch.png" alt="brinquedo stitch" class="logo-extra">
  <img src="angel.png" alt="brinquedo angel" class="logo-extra">
  <img src="roby.png" alt="brinquedo roby" class="logo-extra"> 
  <img src="zoom.png" alt="brinquedo zoom" class="logo-extra">  
<!-- pode adicionar mais imagens abaixo -->
  <!-- <img src="outra.png" alt="Outro brinquedo" class="logo-extra"> -->
</div>

<div id="container-chat" style="background: #fff; border: 2px solid #0b63d6; border-radius: 12px; margin: 10px 0 20px 0; overflow: hidden;">
  <div id="abas-chat" style="display: flex; background: #eef4fb; border-bottom: 1px solid #ccc; overflow-x: auto;">
  <button class="tab-btn tab-sonia active" onclick="abrirChat('Sonia_Danielly')">Sonia/Danielly</button>
  <button class="tab-btn tab-dalva" onclick="abrirChat('Dalva')">Dalva</button>
  <button class="tab-btn tab-josileide" onclick="abrirChat('Josileide')">Josileide</button>
  <button class="tab-btn tab-creuza" onclick="abrirChat('Creuza')">Creuza</button>
  <button class="tab-btn tab-elane" onclick="abrirChat('Elane')">Elane</button>
</div>

  <div id="caixa-mensagens" style="height: 150px; overflow-y: auto; padding: 15px; background: #fdfdfd; font-size: 14px;">
    <p style="color: #888;">Selecione uma encarregada para conversar...</p>
  </div>

  <div style="display: flex; padding: 10px; gap: 8px; background: #eee;">
    <input type="text" id="inputMsg" placeholder="Digite um recado para a encarregada..." style="flex-grow: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
    <button id="btnEnviarMsg" style="background: #0b63d6; color: white; font-weight: bold; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer;">Enviar</button>
  </div>
</div>

<div id="contadorPedidos">Pedidos: 0</div>

<div class="container">
  <h1>📦 Estoque - Sistema de Pedidos</h1>

 <div style="margin: 20px 0; display: flex; gap: 10px; align-items: center;">
  <button id="btnSelecionarTodos" class="btn-secondary">Check / Uncheck Todos</button>
  <button id="btnApagarVarios" style="background-color: #ff4d4d; color: white; display: none;">🗑 Apagar Selecionados</button>
</div>

 
  <h2>⏳ Pedidos Pendentes</h2>
  <div id="listaPendentes" class="list"></div>

  <h2>✅ Pedidos Enviados</h2>
  <div id="listaEnviados" class="list"></div>

  <footer>
    Sistema integrado com Firebase Realtime Database.
  </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, push, onValue, onChildAdded, onChildChanged, onChildRemoved, limitToLast, query, update, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyClTCnRK2dT65VXjmriSrASdJqjmTUVgOs",
  authDomain: "sistema-de-pedidos-208dd.firebaseapp.com",
  databaseURL: "https://sistema-de-pedidos-208dd-default-rtdb.firebaseio.com",
  projectId: "sistema-de-pedidos-208dd",
  storageBucket: "sistema-de-pedidos-208dd.firebasestorage.app",
  messagingSenderId: "728239911093",
  appId: "1:728239911093:web:fdb33f1ea4a4d314738efc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pedidosRef = ref(db, "pedidos");

const listaPendentes = document.getElementById("listaPendentes");
const listaEnviados = document.getElementById("listaEnviados");

// Variáveis do Chat
let chatAtual = "Sonia_Danielly";
const inputMsg = document.getElementById("inputMsg");
const btnEnviarMsg = document.getElementById("btnEnviarMsg");
const caixaMensagens = document.getElementById("caixa-mensagens");
 
// Crie a variável logo abaixo das configurações do Firebase
const pedidosExistentes = new Set();
 
// Som padrão para novas mensagens do chat
const somNotificacao = new Audio("notificacao.mp3?v=1");
let primeiraCargaChat = true; // Evita que toque ao carregar o histórico 


// Cores das Encarregadas (Padronizado com a Produção)
const coresConfig = {
  "sonia": { bg: "#fff0f5", border: "#ff69b4" },
  "dalva": { bg: "#fdf2f2", border: "#e74c3c" },
  "josileide": { bg: "#f2fdf6", border: "#2ecc71" },
  "creuza": { bg: "#f9f2fd", border: "#9b59b6" },
  "elane": { bg: "#fdf7f2", border: "#e67e22" }
};

async function marcarComoLidaEstoque(chat) {
  const msgRef = query(ref(db, `chats/${chat}`), limitToLast(15));
  onValue(msgRef, (snapshot) => {
    snapshot.forEach((child) => {
      const data = child.val();
      // Se a mensagem NÃO veio do Estoque e não está lida, o estoque marca como lida
      if (data.origem !== "Estoque" && data.visualizada === false) {
        update(ref(db, `chats/${chat}/${child.key}`), { visualizada: true });
      }
    });
  }, { onlyOnce: true });
}
 
 // Função que gera um som de "Bip" eletrônico sem precisar de link
function tocarBip() {
    const context = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = context.createOscillator();
    const gain = context.createGain();

    oscillator.type = "sine"; // Som suave
    oscillator.frequency.setValueAtTime(880, context.currentTime); // Frequência do som
    
    gain.gain.setValueAtTime(0.4, context.currentTime); // Volume (0.1 é baixo)
    gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.5);

    oscillator.connect(gain);
    gain.connect(context.destination);

    oscillator.start();
    oscillator.stop(context.currentTime + 0.5);
}

// ===== Função de Renderizar Pedido =====
function renderPedido(id, pedido) {
  if (document.getElementById("i-" + id)) return; // Evita duplicados

  const div = document.createElement("div");
  div.className = "item";
  div.id = "i-" + id;

  let html = `
  <div style="display: flex; align-items: flex-start; gap: 10px; width: 100%;">
    <input type="checkbox" class="pedido-checkbox" value="${id}" style="transform: scale(1.5); margin-top: 5px;">
    <div style="flex-grow: 1;">
      <div style="font-weight:700">${pedido.peca}</div>
      <div class="meta">👩‍🏭 ${pedido.encarregada}</div>
      <div class="meta">📌 Ref: ${pedido.referencia}</div>
      <div class="meta">🕒 Criado em: ${new Date(pedido.createdAt).toLocaleString("pt-BR")}</div>
      ${pedido.observacao ? `<div class="meta">📝 ${pedido.observacao}</div>` : ""}
      ${pedido.enviado && pedido.dataEnvio ? `<div class="meta enviado">✅ Enviado em: ${new Date(pedido.dataEnvio).toLocaleString("pt-BR")}</div>` : ""}
    </div>
  </div>`;
  
  div.innerHTML = html;

  if (!pedido.enviado) {
    const inputObs = document.createElement("textarea");
    inputObs.rows = "2";
    inputObs.placeholder = "📝 Observação opcional para a Produção";
    inputObs.value = pedido.observacao || "";
    inputObs.style.cssText = "margin-top: 5px; width: 100%; resize: vertical;";
    div.appendChild(inputObs);

    const btnEnviar = document.createElement("button");
    btnEnviar.className = "btn-enviar";
    btnEnviar.textContent = "✅ Marcar como enviado";
    btnEnviar.onclick = () => {
      update(ref(db, "pedidos/" + id), { 
        enviado: true, 
        dataEnvio: Date.now(),
        observacao: inputObs.value.trim() 
      });
    };
    div.appendChild(btnEnviar);
    listaPendentes.prepend(div);
  } else {
    listaEnviados.prepend(div);
  }

  const btnApagar = document.createElement("button");
  btnApagar.className = "btn-secondary";
  btnApagar.textContent = "🗑 Apagar";
  btnApagar.onclick = () => {
    if (confirm("Apagar este pedido?")) remove(ref(db, "pedidos/" + id));
  };
  div.appendChild(btnApagar);
}
  
// ===== Chat: Carregar Mensagens =====
function carregarMensagens() {
  const msgRef = query(ref(db, `chats/${chatAtual}`), limitToLast(15));
  
  onValue(msgRef, (snapshot) => {
    caixaMensagens.innerHTML = "";
    
    snapshot.forEach((child) => {
      const data = child.val();
      const p = document.createElement("p");
      const hora = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : "";

      if (data.origem === "Estoque") {
        // --- MENSAGENS QUE VOCÊ ENVIA ---
        p.className = "msg-estoque";
        p.style.backgroundColor = "#e1f5fe";
        p.style.border = "2px solid #0b63d6";
        
        const tique = data.visualizada ? '<span style="color: #007bff; font-weight: bold; margin-left: 5px;">✓✓</span>' : '<span style="color: #888; margin-left: 5px;">✓</span>';

        p.innerHTML = `
          <small style="font-size: 11px;">${hora}</small><br>
          <strong>Estoque:</strong> ${data.texto}
          <div style="text-align: right; margin-top: 2px;">${tique}</div>
        `;
      } else {
        // --- MENSAGENS QUE AS ENCARREGADAS ENVIAM ---
        p.className = "msg-producao";
        const prefixo = data.origem.split('_')[0].toLowerCase();
        const cor = coresConfig[prefixo] || { bg: "#e2e3e5", border: "#d6d8db" };
        
        p.style.backgroundColor = cor.bg;
        p.style.border = `2px solid ${cor.border}`;
        
        p.innerHTML = `
          <small style="font-size: 11px;">${hora}</small><br>
          <strong>${data.origem}:</strong> ${data.texto}
        `;
      }

      caixaMensagens.appendChild(p);
    });
    
    caixaMensagens.scrollTop = caixaMensagens.scrollHeight;

    // --- LÓGICA DE SOM ---
    const mensagens = snapshot.val();
    if (mensagens && !primeiraCargaChat) {
      const chaves = Object.keys(mensagens);
      const ultimaMsg = mensagens[chaves[chaves.length - 1]];

      if (ultimaMsg.origem !== "Estoque") {
        somNotificacao.play().catch(() => tocarBip());
      }
    }
    
    primeiraCargaChat = false; 
  });
}
 
// ===== Função Abrir Chat =====
window.abrirChat = (nome) => {
  chatAtual = nome;
  marcarComoLidaEstoque(nome);
  primeiraCargaChat = true; // Reinicia a trava para não tocar o som do histórico
  const container = document.getElementById("container-chat");
  const caixaMsgs = document.getElementById("caixa-mensagens");
  const prefixo = nome.split('_')[0].toLowerCase();

  document.querySelectorAll('.tab-btn').forEach(btn => {
    const nomeBotao = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
    btn.classList.toggle('active', nomeBotao === nome);
  });

  container.style.border = `3px solid ${coresConfig[prefixo]?.border || '#0b63d6'}`;
  caixaMsgs.style.backgroundColor = coresConfig[prefixo]?.bg || '#fdfdfd';

  carregarMensagens();
};

// Enviar Mensagem
btnEnviarMsg.onclick = async () => {
  const texto = inputMsg.value.trim();
  if (!texto) return;
  
  await push(ref(db, `chats/${chatAtual}`), { 
    texto, 
    origem: "Estoque", 
    timestamp: Date.now(),
    visualizada: false // <--- ADICIONE ISSO
  });
  inputMsg.value = "";
};

// ====== Sincronização em Tempo Real ======
onChildAdded(pedidosRef, (snap) => {
  const id = snap.key;
  renderPedido(id, snap.val());
  
  if (!pedidosExistentes.has(id)) {
    pedidosExistentes.add(id);
    somNotificacao.play().catch(() => {});
  }
});

onChildChanged(pedidosRef, (snap) => {
  const el = document.getElementById("i-" + snap.key);
  if (el) el.remove();
  renderPedido(snap.key, snap.val());
});

onChildRemoved(pedidosRef, (snap) => {
  const el = document.getElementById("i-" + snap.key);
  if (el) el.remove();
});

onValue(pedidosRef, (snap) => {
  const total = snap.exists() ? Object.keys(snap.val()).length : 0;
  document.getElementById("contadorPedidos").innerText = `Pedidos: ${total}`;
});

// ====== Lógica de Seleção em Massa ======
const btnSelecionarTodos = document.getElementById("btnSelecionarTodos");
const btnApagarVarios = document.getElementById("btnApagarVarios");

btnSelecionarTodos.onclick = () => {
  const checkboxes = document.querySelectorAll(".pedido-checkbox");
  const todosMarcados = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => cb.checked = !todosMarcados);
  atualizarBotaoApagar();
};

document.addEventListener("change", (e) => {
  if (e.target.classList.contains("pedido-checkbox")) atualizarBotaoApagar();
});

function atualizarBotaoApagar() {
  const selecionados = document.querySelectorAll(".pedido-checkbox:checked").length;
  btnApagarVarios.style.display = selecionados > 0 ? "block" : "none";
  btnApagarVarios.textContent = `🗑 Apagar Selecionados (${selecionados})`;
}

btnApagarVarios.onclick = async () => {
  const selecionados = document.querySelectorAll(".pedido-checkbox:checked");
  if (confirm(`Apagar ${selecionados.length} pedidos?`)) {
    for (let cb of selecionados) await remove(ref(db, "pedidos/" + cb.value));
    btnApagarVarios.style.display = "none";
  }
};

// Início
window.abrirChat('Sonia_Danielly');
</script>
</body>
</html>
